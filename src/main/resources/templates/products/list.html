<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #f2f2f2; text-align: left; }
        a.button { display: inline-block; padding: 6px 10px; border: 1px solid #333; text-decoration: none; margin-right: 8px; }
    </style>
</head>
<body>
<h1>Product List</h1>

<div style="margin-bottom: 12px;">
    <span th:if="${currentUser != ''}">Signed in as <strong th:text="${currentUser}"></strong></span>
    <form th:action="@{/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="button">Logout</button>
    </form>
</div>

<div th:if="${isAdmin}">
    <a class="button" href="/admin/products">Admin Products</a>
    <a class="button" href="/admin/categories">Admin Categories</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th>Category</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${product.price}"></td>
        <td th:text="${product.category != null ? product.category.name : '-'}"></td>
        <td>
            <a th:href="@{/products/{id}(id=${product.id})}">View</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
