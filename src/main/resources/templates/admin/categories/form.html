<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        label { display: block; margin-top: 12px; }
        input { width: 320px; padding: 6px; }
        .error { color: #c00; font-size: 0.9em; }
        button { padding: 6px 12px; margin-top: 12px; }
        a.button { display: inline-block; padding: 6px 10px; border: 1px solid #333; text-decoration: none; margin-left: 8px; }
    </style>
</head>
<body>
<h1 th:text="${category.id == null ? 'Create Category' : 'Edit Category'}"></h1>

<form th:action="${category.id} == null ? @{/admin/categories} : @{/admin/categories/{id}(id=${category.id})}" method="post" th:object="${category}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <label for="name">Name</label>
    <input type="text" id="name" th:field="*{name}" />
    <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

    <div>
        <button type="submit">Save</button>
        <a class="button" href="/admin/categories">Cancel</a>
    </div>
</form>
</body>
</html>
