<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .card { max-width: 360px; padding: 20px; border: 1px solid #ddd; }
        label { display: block; margin-top: 12px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { margin-top: 16px; padding: 8px 12px; }
        .error { color: #c00; margin-top: 8px; }
        .success { color: #0a0; margin-top: 8px; }
        a { display: inline-block; margin-top: 12px; }
    </style>
</head>
<body>
<h1>Login</h1>
<div class="card">
    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <label for="username">Login Name</label>
        <input type="text" id="username" name="username" />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" />

        <button type="submit">Login</button>
    </form>
    <div class="error" th:if="${param.error}">Invalid username or password</div>
    <div class="success" th:if="${param.registered}">Register success. Please login.</div>
    <div class="success" th:if="${param.logout}">You have logged out.</div>

    <a href="/register">Create new account</a>
</div>
</body>
</html>
