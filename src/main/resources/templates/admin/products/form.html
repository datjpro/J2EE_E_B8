<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        label { display: block; margin-top: 12px; }
        input, select { width: 320px; padding: 6px; }
        .error { color: #c00; font-size: 0.9em; }
        button { padding: 6px 12px; margin-top: 12px; }
        a.button { display: inline-block; padding: 6px 10px; border: 1px solid #333; text-decoration: none; margin-left: 8px; }
    </style>
</head>
<body>
<h1 th:text="${product.id == null ? 'Create Product' : 'Edit Product'}"></h1>

<form th:action="${product.id} == null ? @{/admin/products} : @{/admin/products/{id}(id=${product.id})}" method="post" th:object="${product}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <label for="name">Name</label>
    <input type="text" id="name" th:field="*{name}" />
    <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

    <label for="image">Image URL</label>
    <input type="text" id="image" th:field="*{image}" />
    <div class="error" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>

    <label for="price">Price</label>
    <input type="number" step="0.01" id="price" th:field="*{price}" />
    <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>

    <label for="category">Category</label>
    <select id="category" th:field="*{category}">
        <option value="">-- Select Category --</option>
        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
    </select>
    <div class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>

    <div>
        <button type="submit">Save</button>
        <a class="button" href="/admin/products">Cancel</a>
    </div>
</form>
</body>
</html>
