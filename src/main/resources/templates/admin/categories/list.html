<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Categories</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #f2f2f2; text-align: left; }
        a.button, button.button { display: inline-block; padding: 6px 10px; border: 1px solid #333; text-decoration: none; margin-right: 8px; background: #fff; cursor: pointer; }
        form.inline { display: inline; }
    </style>
</head>
<body>
<h1>Admin Category List</h1>

<div>
    <a class="button" href="/admin/categories/new">Create Category</a>
    <a class="button" href="/admin/products">Manage Products</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="category : ${categories}">
        <td th:text="${category.id}"></td>
        <td th:text="${category.name}"></td>
        <td>
            <a th:href="@{/admin/categories/{id}/edit(id=${category.id})}">Edit</a>
            <form class="inline" th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button class="button" type="submit" onclick="return confirm('Delete this category?');">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
